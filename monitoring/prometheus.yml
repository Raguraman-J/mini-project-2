global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend_service'
    static_configs:
      - targets: ['backend:5000']
    # Note: You will need to expose a /metrics endpoint in your Node.js backend using a library like 'prom-client'
